<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Win Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='color.css') }}">
</head>
<body>
    <div class="container">
        <h2>IPL Match Win Predictor</h2>
        <form id="predictionForm">
            <div class="form-group">
                <label>Batting Team</label>
                <select id="batting_team" required>
                    <option value="Mumbai Indians">Mumbai Indians</option>
                    <option value="Chennai Super Kings">Chennai Super Kings</option>
                    <option value="Royal Challengers Bangalore">Royal Challengers Bangalore</option>
                    <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
                    <option value="Rajasthan Royals">Rajasthan Royals</option>
                    <option value="Delhi Capitals">Delhi Capitals</option>
                    <option value="Punjab Kings">Punjab Kings</option>
                    <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
                    <option value="Gujarat Titans">Gujarat Titans</option>
                    <option value="Lucknow Super Giants">Lucknow Super Giants</option>
                </select>
            </div>

            <div class="form-group">
                <label>Bowling Team</label>
                <select id="bowling_team" required>
                    <option value="Chennai Super Kings">Chennai Super Kings</option>
                    <option value="Mumbai Indians">Mumbai Indians</option>
                    <option value="Royal Challengers Bangalore">Royal Challengers Bangalore</option>
                    <option value="Kolkata Knight Riders">Kolkata Knight Riders</option>
                    <option value="Rajasthan Royals">Rajasthan Royals</option>
                    <option value="Delhi Capitals">Delhi Capitals</option>
                    <option value="Punjab Kings">Punjab Kings</option>
                    <option value="Sunrisers Hyderabad">Sunrisers Hyderabad</option>
                    <option value="Gujarat Titans">Gujarat Titans</option>
                    <option value="Lucknow Super Giants">Lucknow Super Giants</option>
                </select>
            </div>
            <div class="form-group">
                <label>Host City(Stadium)</label>
                
                <select id="city" required>
                    <option value="" disabled selected>Select Host City</option>
                    <!-- <option value="Abu Dhabi">Abu Dhabi</option> -->
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Bangalore">Bangalore</option>
                    <!-- <option value="Bengaluru">Bengaluru</option>
                    <option value="Bloemfontein">Bloemfontein</option>
                    <option value="Cape Town">Cape Town</option>
                    <option value="Centurion">Centurion</option> -->
                    <option value="Chandigarh">Chandigarh</option>
                    <option value="Chennai">Chennai</option>
                    <option value="Cuttack">Cuttack</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Dharamsala">Dharamsala</option>
                    <!-- <option value="Dubai">Dubai</option>
                    <option value="Durban">Durban</option> -->
                    <!-- <option value="East London">East London</option> -->
                    <option value="Guwahati">Guwahati</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Indore">Indore</option>
                    <option value="Jaipur">Jaipur</option>
                    <!-- <option value="Johannesburg">Johannesburg</option> -->
                    <!-- <option value="Kimberley">Kimberley</option> -->
                    <option value="Kolkata">Kolkata</option>
                    <option value="Lucknow">Lucknow</option>
                    <option value="Mohali">Mohali</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Navi Mumbai">Navi Mumbai</option>
                    <!-- <option value="Port Elizabeth">Port Elizabeth</option> -->
                    <option value="Pune">Pune</option>
                    <option value="Raipur">Raipur</option>
                    <option value="Ranchi">Ranchi</option>
                    <!-- <option value="Sharjah">Sharjah</option> -->
                    <option value="Visakhapatnam">Visakhapatnam</option>
                </select>
            </div>
        

            <!-- <div class="form-group">
                <label>Host City</label>
                <input type="text" id="city" placeholder="e.g., Mumbai" required>
            </div> -->

            <div class="row">
                <div class="form-group">
                    <label>Target (Total Runs)</label>
                    <input type="number" id="total_runs_x" placeholder="180" required>
                </div>
                <div class="form-group">
                    <label>Runs Left to Win</label>
                    <input type="number" id="runs_left" placeholder="45" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Balls Left</label>
                    <input type="number" id="balls_left" placeholder="30" required>
                </div>
                <div class="form-group">
                    <label>Wickets In Hand (0-10)</label>
                    <input type="number" id="wickets" placeholder="6" min="0" max="10" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Current Run Rate (CRR)</label>
                    <input type="number" id="crr" step="0.01" placeholder="9.0" required>
                </div>
                <div class="form-group">
                    <label>Required Run Rate (RRR)</label>
                    <input type="number" id="rrr" step="0.01" placeholder="9.0" required>
                </div>
            </div>

            <button type="submit">Predict Probability</button>
        </form>

        <div id="resultCard" class="result-card hidden">
            <h3>Prediction Result</h3>
            <div class="result-bar-container">
                <div id="winBar" class="bar win-bar"></div>
            </div>
            <p id="resultText"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
